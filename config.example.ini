```ini
[General]
; This section contains general program settings
GamePath=C:\Program Files\LostArk
; Path to the Lost Ark installation directory
AutoStart=true
; Automatically start the grind helper when the game launches
GrindInterval=300
; Time (in seconds) between grind sessions

[Hotkeys]
; Hotkeys for various actions within the app
StartGrind=F7
; Hotkey to start grinding
StopGrind=F8
; Hotkey to stop grinding
UseSkill1=1
; Hotkey to use Skill 1 (mapped to the keyboard number 1)
UseSkill2=2
; Hotkey to use Skill 2 (mapped to the keyboard number 2)
UseHealthPotion=H
; Hotkey to use health potions

[Features]
; Configuration for specific features of the grind helper
AutoLoot=true
; Automatically loot items from defeated enemies
UseMount=true
; Automatically use your mount for faster travel
MonitorHP=true
; Monitor health and use potions when HP is below a threshold
HPThreshold=30
; Health percentage to trigger potion use
EnableFarmRoute=true
; Enable specified farm route for grinding

[Display]
; Display settings for the application's user interface
ShowNotifications=true
; Show notifications when grinding starts and stops
NotificationSound=C:\Sounds\notification.wav
; Path to the notification sound file
DisplayFPS=true
; Display the current frames per second in the app
WindowOpacity=80
; Opacity for the app window (0-100)
```